name: APEX Agent

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes — SL/TP detected within 5 min max
  workflow_dispatch:          # allow manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APEX Agent
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://apex-trader-btc.vercel.app/api/agent
