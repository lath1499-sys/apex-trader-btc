name: APEX Agent

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APEX Agent
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://apex-trader-btc.vercel.app/api/agent
